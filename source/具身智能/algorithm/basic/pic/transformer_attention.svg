<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <defs>
    <style>
      .box { fill: #f7fbff; stroke: #2f6f9f; stroke-width: 2; rx: 12; }
      .soft { fill: #fff8ec; stroke: #c77d1f; stroke-width: 2; rx: 12; }
      .out { fill: #f2fff7; stroke: #2c8a57; stroke-width: 2; rx: 12; }
      .txt { font-family: Arial, "PingFang SC", sans-serif; font-size: 22px; fill: #222; }
      .small { font-family: Arial, "PingFang SC", sans-serif; font-size: 17px; fill: #444; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="32" y="38" width="160" height="70" class="box"/>
  <text x="112" y="80" text-anchor="middle" class="txt">输入 tokens</text>
  <text x="112" y="132" text-anchor="middle" class="small">词 / 图像 patch / 状态</text>

  <rect x="270" y="25" width="120" height="56" class="soft"/>
  <rect x="270" y="105" width="120" height="56" class="soft"/>
  <rect x="270" y="185" width="120" height="56" class="soft"/>
  <text x="330" y="60" text-anchor="middle" class="txt">Q</text>
  <text x="330" y="140" text-anchor="middle" class="txt">K</text>
  <text x="330" y="220" text-anchor="middle" class="txt">V</text>
  <text x="330" y="275" text-anchor="middle" class="small">每个 token 生成查询、键、值</text>

  <rect x="470" y="70" width="190" height="105" class="soft"/>
  <text x="565" y="112" text-anchor="middle" class="txt">注意力权重</text>
  <text x="565" y="145" text-anchor="middle" class="small">谁和我最相关？</text>

  <rect x="735" y="58" width="190" height="130" class="out"/>
  <text x="830" y="104" text-anchor="middle" class="txt">上下文表示</text>
  <text x="830" y="138" text-anchor="middle" class="small">汇总重要信息</text>
  <text x="830" y="164" text-anchor="middle" class="small">进入后续层</text>

  <path d="M192 73 L270 53" class="arrow"/>
  <path d="M192 73 L270 133" class="arrow"/>
  <path d="M192 73 L270 213" class="arrow"/>
  <path d="M390 53 L470 103" class="arrow"/>
  <path d="M390 133 L470 123" class="arrow"/>
  <path d="M390 213 L470 150" class="arrow"/>
  <path d="M660 122 L735 122" class="arrow"/>

  <text x="490" y="350" class="small" text-anchor="middle">核心直觉：每个 token 不再只看相邻位置，而是直接选择整段输入中最重要的信息。</text>
</svg>
