<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440">
  <defs>
    <style>
      .img { fill: #f2fbff; stroke: #2f6f9f; stroke-width: 2; rx: 12; }
      .txtbox { fill: #fff8ec; stroke: #c77d1f; stroke-width: 2; rx: 12; }
      .space { fill: #f5fff7; stroke: #2c8a57; stroke-width: 2; rx: 12; }
      .txt { font-family: Arial, "PingFang SC", sans-serif; font-size: 22px; fill: #222; }
      .small { font-family: Arial, "PingFang SC", sans-serif; font-size: 17px; fill: #444; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .good { stroke: #2c8a57; stroke-width: 4; }
      .bad { stroke: #cc5252; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="50" y="65" width="180" height="85" class="img"/>
  <text x="140" y="113" text-anchor="middle" class="txt">图片编码器</text>
  <text x="140" y="178" text-anchor="middle" class="small">image -> vector</text>

  <rect x="50" y="250" width="180" height="85" class="txtbox"/>
  <text x="140" y="298" text-anchor="middle" class="txt">文本编码器</text>
  <text x="140" y="363" text-anchor="middle" class="small">text -> vector</text>

  <rect x="340" y="95" width="280" height="220" class="space"/>
  <text x="480" y="135" text-anchor="middle" class="txt">共享语义空间</text>
  <circle cx="430" cy="190" r="14" fill="#2f6f9f"/>
  <circle cx="475" cy="205" r="14" fill="#c77d1f"/>
  <line x1="430" y1="190" x2="475" y2="205" class="good"/>
  <circle cx="535" cy="250" r="14" fill="#2f6f9f"/>
  <circle cx="400" cy="270" r="14" fill="#c77d1f"/>
  <line x1="535" y1="250" x2="400" y2="270" class="bad"/>
  <text x="480" y="300" text-anchor="middle" class="small">匹配图文靠近，不匹配图文远离</text>

  <rect x="735" y="125" width="190" height="160" class="txtbox"/>
  <text x="830" y="170" text-anchor="middle" class="txt">Zero-shot</text>
  <text x="830" y="205" text-anchor="middle" class="small">a photo of a cup</text>
  <text x="830" y="232" text-anchor="middle" class="small">a photo of a robot</text>
  <text x="830" y="259" text-anchor="middle" class="small">选择最相似文本</text>

  <path d="M230 108 L340 175" class="arrow"/>
  <path d="M230 292 L340 240" class="arrow"/>
  <path d="M620 205 L735 205" class="arrow"/>
</svg>
