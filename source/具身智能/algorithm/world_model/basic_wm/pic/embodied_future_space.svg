<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <style>
      .input { fill: #fff8ec; stroke: #c77d1f; stroke-width: 2; rx: 12; }
      .space { fill: #f2fbff; stroke: #2f6f9f; stroke-width: 2; rx: 18; }
      .goal { fill: #f5fff7; stroke: #2c8a57; stroke-width: 2; rx: 12; }
      .txt { font-family: Arial, "PingFang SC", sans-serif; font-size: 22px; fill: #222; }
      .small { font-family: Arial, "PingFang SC", sans-serif; font-size: 17px; fill: #444; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="55" y="80" width="180" height="105" class="input"/>
  <text x="145" y="124" text-anchor="middle" class="txt">当前场景</text>
  <text x="145" y="154" text-anchor="middle" class="small">observation</text>
  <rect x="55" y="245" width="180" height="105" class="input"/>
  <text x="145" y="289" text-anchor="middle" class="txt">任务与动作</text>
  <text x="145" y="319" text-anchor="middle" class="small">goal + action</text>
  <rect x="360" y="80" width="280" height="270" class="space"/>
  <text x="500" y="125" text-anchor="middle" class="txt">具身未来空间</text>
  <circle cx="445" cy="195" r="15" fill="#2f6f9f"/>
  <circle cx="505" cy="245" r="15" fill="#c77d1f"/>
  <circle cx="555" cy="180" r="15" fill="#2c8a57"/>
  <text x="500" y="305" text-anchor="middle" class="small">多个可能未来状态</text>
  <rect x="745" y="155" width="180" height="115" class="goal"/>
  <text x="835" y="200" text-anchor="middle" class="txt">选择未来</text>
  <text x="835" y="230" text-anchor="middle" class="small">更接近任务目标</text>
  <path d="M235 132 L360 170" class="arrow"/>
  <path d="M235 298 L360 250" class="arrow"/>
  <path d="M640 215 L745 215" class="arrow"/>
</svg>
