<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <style>
      .cond { fill: #fff8ec; stroke: #c77d1f; stroke-width: 2; rx: 12; }
      .model { fill: #f2fbff; stroke: #2f6f9f; stroke-width: 2; rx: 12; }
      .video { fill: #f5fff7; stroke: #2c8a57; stroke-width: 2; rx: 12; }
      .txt { font-family: Arial, "PingFang SC", sans-serif; font-size: 22px; fill: #222; }
      .small { font-family: Arial, "PingFang SC", sans-serif; font-size: 17px; fill: #444; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="55" y="80" width="210" height="120" class="cond"/>
  <text x="160" y="126" text-anchor="middle" class="txt">条件输入</text>
  <text x="160" y="158" text-anchor="middle" class="small">文本 / 图像 / 视频</text>
  <rect x="370" y="80" width="230" height="120" class="model"/>
  <text x="485" y="126" text-anchor="middle" class="txt">视频生成模型</text>
  <text x="485" y="158" text-anchor="middle" class="small">时空 patch + 去噪</text>
  <rect x="705" y="80" width="210" height="120" class="video"/>
  <text x="810" y="126" text-anchor="middle" class="txt">未来视频</text>
  <text x="810" y="158" text-anchor="middle" class="small">连续世界变化</text>
  <path d="M265 140 L370 140" class="arrow"/>
  <path d="M600 140 L705 140" class="arrow"/>
  <text x="490" y="310" text-anchor="middle" class="small">核心直觉：从大量视频中学习世界如何随时间演化，再根据条件生成可能的未来。</text>
</svg>
