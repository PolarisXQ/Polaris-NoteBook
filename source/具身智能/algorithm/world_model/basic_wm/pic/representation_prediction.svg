<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <style>
      .ctx { fill: #f2fbff; stroke: #2f6f9f; stroke-width: 2; rx: 12; }
      .target { fill: #fff8ec; stroke: #c77d1f; stroke-width: 2; rx: 12; }
      .pred { fill: #f5fff7; stroke: #2c8a57; stroke-width: 2; rx: 12; }
      .txt { font-family: Arial, "PingFang SC", sans-serif; font-size: 22px; fill: #222; }
      .small { font-family: Arial, "PingFang SC", sans-serif; font-size: 17px; fill: #444; }
      .arrow { stroke: #555; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="55" y="80" width="190" height="120" class="ctx"/>
  <text x="150" y="130" text-anchor="middle" class="txt">可见视频片段</text>
  <text x="150" y="162" text-anchor="middle" class="small">context</text>
  <rect x="335" y="80" width="190" height="120" class="pred"/>
  <text x="430" y="130" text-anchor="middle" class="txt">预测器</text>
  <text x="430" y="162" text-anchor="middle" class="small">predict embedding</text>
  <rect x="615" y="80" width="220" height="120" class="target"/>
  <text x="725" y="130" text-anchor="middle" class="txt">目标区域表征</text>
  <text x="725" y="162" text-anchor="middle" class="small">不是像素，是语义表示</text>
  <path d="M245 140 L335 140" class="arrow"/>
  <path d="M525 140 L615 140" class="arrow"/>
  <text x="490" y="310" text-anchor="middle" class="small">核心直觉：少纠结像素细节，多学习“未来/缺失区域在语义上应该是什么”。</text>
</svg>
