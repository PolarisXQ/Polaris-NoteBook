<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">DreamerV3 three networks</title>
  <desc id="desc">DreamerV3 uses a world model, critic, and actor trained from real and imagined experience.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .env { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .wm { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; }
      .critic { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 14; }
      .actor { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .label { font: 700 23px sans-serif; fill: #0f172a; }
      .small { font: 17px sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1040" height="430"/>
  <rect class="env" x="55" y="170" width="185" height="90"/>
  <text class="label" x="147.5" y="207" text-anchor="middle">环境交互</text>
  <text class="small" x="147.5" y="235" text-anchor="middle">经验回放</text>
  <path class="arrow" d="M240 215 L325 215"/>
  <rect class="wm" x="325" y="135" width="230" height="160"/>
  <text class="label" x="440" y="180" text-anchor="middle">World Model</text>
  <text class="small" x="440" y="212" text-anchor="middle">预测未来表示</text>
  <text class="small" x="440" y="240" text-anchor="middle">奖励 / 终止</text>
  <path class="arrow" d="M555 215 L640 215"/>
  <rect class="critic" x="640" y="70" width="190" height="90"/>
  <text class="label" x="735" y="107" text-anchor="middle">Critic</text>
  <text class="small" x="735" y="135" text-anchor="middle">评估长期价值</text>
  <rect class="actor" x="640" y="270" width="190" height="90"/>
  <text class="label" x="735" y="307" text-anchor="middle">Actor</text>
  <text class="small" x="735" y="335" text-anchor="middle">选择动作</text>
  <path class="arrow" d="M735 160 L735 270"/>
  <path class="dash" d="M830 315 C960 285, 960 145, 830 115"/>
  <path class="dash" d="M640 315 C565 315, 565 255, 555 245"/>
  <text class="small" x="918" y="215" text-anchor="middle">想象训练闭环</text>
</svg>
